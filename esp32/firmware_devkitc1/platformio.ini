; LensLife case firmware — ESP-IDF via PlatformIO
; Open THIS folder (esp32/firmware) as the project root in VS Code.

[platformio]
description = LensLife ESP32-S3 case firmware (NimBLE + sensors)
; ESP-IDF uses main/ (not src/) — required for PlatformIO espidf builds
src_dir = main

[env:esp32-s3-n16r8]
platform = espressif32 @ ~6.10.0
; N16R8 = 16 MB flash + 8 MB OPI PSRAM (use generic devkitc-1 if this board ID is missing)
; PlatformIO 6.x has no dedicated n16r8 board ID — flash/PSRAM overrides below match N16R8
board = esp32-s3-devkitc-1
framework = espidf

board_build.flash_size = 16MB
board_build.psram_type = opi
board_upload.flash_size = 16MB

monitor_speed = 115200
upload_speed = 921600
monitor_rts = 0
monitor_dtr = 0

; Uncomment after: pio device list
; upload_port = /dev/cu.usbmodem1101
; monitor_port = /dev/cu.usbmodem1101

build_flags =
    -D IDF_IGNORE_GIT_VERSION_CHECK=1

; Fallback env if esp32-s3-devkitc-1-n16r8 is not in your PlatformIO install:
[env:esp32-s3-devkitc-1]
platform = espressif32 @ ~6.10.0
board = esp32-s3-devkitc-1
framework = espidf
board_build.flash_size = 16MB
board_build.psram_type = opi
board_upload.flash_size = 16MB
monitor_speed = 115200
upload_speed = 921600
monitor_rts = 0
monitor_dtr = 0
build_flags =
    -D IDF_IGNORE_GIT_VERSION_CHECK=1

